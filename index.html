<!DOCTYPE HTML>

<html>
	<head>
		<title>Daniel Okene</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			/* Add custom styles for the button list layout */
			.button-list-container {
				display: flex;
				flex-direction: column;
				align-items: center;
				margin-top: 20px;
			}
	
			.button-list-item {
				margin-bottom: 10px;
				margin-left: 5px; /* Add left margin to create spacing between buttons */
			}
			
			/* Default font color for not selected buttons */
			.button-list-item a {
            color: rgb(202, 201, 201);
            text-decoration: none;
			font-size: 20px;
        	}

			/* Define a transition for the color property */
			.button-list-item a {
				transition: color 0.3s ease;
			}

			/* Change the font color to white on hover */
			.button-list-item a:hover {
				color: rgb(255, 255, 255);
			}
        
			/* Add a new class to highlight the active button */
        	.active {
            	font-weight: bold;
				color: rgb(126, 13, 13); /* Set the color for the active button */
        	}

			        /* Center the avatar and footer */
					#header .inner {
            display: flex;
            flex-direction: column;
            align-items: center;
			text-align: center; /* Ensures text is aligned */
        	}

			#footer .inner {
				display: flex;
				flex-direction: column;
				align-items: center;
			}
			

    </style>
		</style>
	</head>

	<body class="is-preload">

		<!-- Header -->
			<header id="header">
				<button id="menu-toggle" class="menu-toggle">
					<span></span>
					<span></span>
					<span></span>
				</button>
				<div class="inner">
					<a href="#" class="image avatar">
						<img src="images/headshot.jpg" alt="" style="width: 180px; height: 180px; border: 2px solid white;"/>
					</a>
					<h2> 
						<strong> Daniel Okene </strong>
					</h2>
					<h3> 
						Computational Thermo-Fluid Researcher
					</h3>
					<h4>
						<a target="_blank" rel="noopener">
						<span>CFD | FEA | HPC | SciML</span>
						</a>
				    </h4>
				        <!-- Clickable Buttons -->
						<nav id="mobile-menu" class="mobile-menu">
							<a href="#" class="load-content-button" data-link="about.html" style="border-bottom: none;">About Me</a>
							<a href="#" class="load-content-button" data-link="projects.html" style="border-bottom: none;">Projects</a>
							<a href="#" class="load-content-button" data-link="publications.html" style="border-bottom: none;">Publications</a>
							<a href="#" class="load-content-button" data-link="presentation.html" style="border-bottom: none;">Presentations</a>
							<a href="pdf/Daniel Okene Curriculum Vitae.pdf" target="_blank" style="border-bottom: none;">Download CV</a>
							<!-- Add more buttons with the same class and different data-link attributes for each button -->
						</nav>
				</div>
			</header>

		<!-- Main -->
			<div id="main">
				<!-- One -->
				<section id="one">
					<!-- Initial content is left empty for dynamic loading -->
				</section>

			</div>

		<!-- Footer -->
			<footer id="footer">
				<div class="inner">
					<ul class="icons">
						<li><a href="https://linkedin.com/in/daniel-okene" target="_blank" rel="noopener noreferrer" class="icon brands fa-linkedin fa-2x"><span class="label">LinkedIn</span></a></li>
						<li><a href="https://scholar.google.com/citations?user=M4AaLHgAAAAJ&hl=en" target="_blank" rel="noopener noreferrer" class="ai ai-google-scholar-square ai-3x" style="border-bottom: none;"></a></li>
						<li><a href="https://github.com/danielokene" target="_blank" rel="noopener noreferrer" class="icon brands fa-github fa-2x"><span class="label">Github</span></a></li>
						<li><a href="mailto:okenedaniel44@gmail.com" target="_blank" rel="noopener noreferrer" class="icon solid fa-envelope fa-2x"><span class="label">Email</span></a></li>
					</ul>
				</div>
			</footer>

		<!-- Scripts -->

			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.poptrox.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>

		<script>

			const pageTitles = {
    			"about.html": "About Me",
    			"projects.html": "Projects",
    			"publications.html": "Publications",
    			"presentation.html": "Presentations"
			};
			
			// JavaScript to handle the link clicks
			function loadContent(linkTarget) {
					// Fetch and load the content from the target HTML file
					fetch(linkTarget)
						.then(response => response.text())
						.then(content => {
							const mainSection = document.getElementById('one');
							mainSection.innerHTML = content;
							document.title = "Daniel Okene | " + (pageTitles[linkTarget] || "Portfolio");
							// Scroll smoothly to the top
							window.scrollTo({
							top: 0,
							behavior: "smooth"
							});
						});
				}

				// Function to load the content of the first page during the initial page load
					document.addEventListener("DOMContentLoaded", () => {
						const params = new URLSearchParams(window.location.search);
						const page = params.get("page");
						const pageToLoad = page ? page + ".html" : "about.html";
						loadContent(pageToLoad);
						document.querySelectorAll(".load-content-button").forEach(button => {

							if(button.dataset.link === pageToLoad){
								button.classList.add("active");
					}
				});
			});

			// Event listener for the clickable buttons in the navigation
			const buttons = document.querySelectorAll('.load-content-button');
			buttons.forEach(button => {
				button.addEventListener('click', event => {
					event.preventDefault();

					// If the button is already active, do nothing
					if (button.classList.contains('active')) {
						return;
					}

					// Remove the "active" class from all navigation buttons
					buttons.forEach(btn => {
						btn.classList.remove('active');
					});

					// Add the "active" class to the clicked navigation button
					button.classList.add('active');

					// Load the content of the target link
					const linkTarget = button.getAttribute('data-link');
					loadContent(linkTarget);
					mobileMenu.classList.remove("show");


					// Update the URL using pushState to maintain navigation functionality
					history.pushState(
						{ page: linkTarget },
						"",
					"?page=" + linkTarget.replace(".html", "")
					);
				});
			});

			// Handle browser back/forward buttons to maintain navigation functionality
			window.addEventListener("popstate", () => {
				const params = new URLSearchParams(window.location.search);
				const page = params.get("page");
				const pageToLoad = page ? page + ".html" : "about.html";
				loadContent(pageToLoad);
			});

			// Handles hamburger toggling
			const menuButton = document.getElementById("menu-toggle");
			const mobileMenu = document.getElementById("mobile-menu");

			menuButton.addEventListener("click",()=>{
				mobileMenu.classList.toggle("show");
			});
		</script>
	</body>
	
</html>
